name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up exact Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.9"
      - name: Validate locked runner toolchain
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
        run: scripts/check-toolchain.sh
      - name: Install exact CI wheels
        run: >-
          python -m pip install --disable-pip-version-check --no-deps
          --only-binary=:all: --require-hashes -r requirements-ci.lock
      - name: Check context
        run: PYTHON="$(command -v python)" scripts/context-check.sh
      - name: Run full local gate
        run: PYTHON="$(command -v python)" scripts/check.sh
      - name: Check static Pages independently
        run: PYTHON="$(command -v python)" scripts/pages-check.sh
      - name: Check exact Pages archive inventory
        run: |
          gtar --format=ustar -cf "${RUNNER_TEMP}/pages-artifact.tar" -C docs .
          PYTHON="$(command -v python)" scripts/pages-check.sh \
            check-artifact --artifact "${RUNNER_TEMP}/pages-artifact.tar"
      - name: Fetch only locked build inputs
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
          RAPP_DEPENDENCY_CACHE: ${{ runner.temp }}/rapp-cache
        run: scripts/fetch-dependencies.sh
      - name: Build twice on one locked runner toolchain
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
          RAPP_DEPENDENCY_CACHE: ${{ runner.temp }}/rapp-cache
          RAPP_SOURCE_REVISION: ${{ github.sha }}
          SOURCE_DATE_EPOCH: "1783892570"
        run: |
          RAPP_BUILD_OUTPUT="${RUNNER_TEMP}/build-one" scripts/build-release.sh
          RAPP_BUILD_OUTPUT="${RUNNER_TEMP}/build-two" scripts/build-release.sh
          diff -rq "${RUNNER_TEMP}/build-one" "${RUNNER_TEMP}/build-two"
      - name: Verify primary artifacts
        env:
          PYTHONPATH: src
        run: |
          python -m rapp_stack_cubby verify-artifact --artifact "${RUNNER_TEMP}/build-one/rapp-stack-cubby.egg"
          python -m rapp_stack_cubby verify-artifact --artifact "${RUNNER_TEMP}/build-one/rapp-stack-cubby-store.zip"
